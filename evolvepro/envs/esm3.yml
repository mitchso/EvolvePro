name: esm3

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch=2.5
  - biopython
  - pandas
  - numpy>=1.22
  - pathlib
  - pip
  - pip:
      - esm  # ESM3 from EvolutionaryScale (installs via pip)
      - huggingface_hub # needed for any model that comes from huggingface
      - httpx